<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestión de Inventario de Dispositivos Médicos</h1>
    
    <form id="formProducto">
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="text" id="codigo" placeholder="Código" required>
        <input type="number" id="cantidad" placeholder="Cantidad" min="1" required>
        <input type="date" id="vencimiento" required>
        <button type="submit">Agregar</button>
    </form>

    <table id="tablaInventario">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Código</th>
                <th>Cantidad</th>
                <th>Vencimiento</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
